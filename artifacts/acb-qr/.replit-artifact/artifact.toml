kind = "web"
previewPath = "/"
title = "ACB Dynamic QR Studio"
version = "1.0.0"
id = "artifacts/acb-qr"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24339

[services.development]
run = "pnpm --filter @workspace/acb-qr run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/acb-qr", "run", "build" ]
publicDir = "artifacts/acb-qr/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24339"
BASE_PATH = "/"
